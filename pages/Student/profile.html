<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPSTS – My Profile</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/dashboard.css" />
  <link rel="stylesheet" href="../../css/student.css" />
</head>
<body>
<div class="app-shell">

  <!-- ═══════════════ SIDEBAR ═══════════════ -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="../../assets/images/logo.png" alt="OPSTS Logo" />
      <div class="brand-text">OPSTS<small>Student Portal</small></div>
    </div>
    <div class="sidebar-user">
      <div class="avatar" id="sideAvatar"></div>
      <div>
        <div class="u-name" id="sideUserName"></div>
        <div class="u-role" id="sideUserMeta"></div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div>
      <div class="nav-item" data-page="dashboard.html">
        <span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span>
      </div>
      <div class="nav-item" data-page="submissions.html">
        <span class="nav-icon">📤</span><span class="nav-label">My Submissions</span>
      </div>
      <div class="nav-item" data-page="feedback.html">
        <span class="nav-icon">💬</span><span class="nav-label">Feedback</span>
        <span class="nav-badge hidden" id="fbBadge"></span>
      </div>
      <div class="nav-item" data-page="progress.html">
        <span class="nav-icon">📊</span><span class="nav-label">Progress</span>
      </div>
      <div class="nav-section">Communication</div>
      <div class="nav-item" data-page="meetings.html">
        <span class="nav-icon">📅</span><span class="nav-label">Meetings</span>
      </div>
      <div class="nav-item" data-page="notifications.html">
        <span class="nav-icon">🔔</span><span class="nav-label">Notifications</span>
        <span class="nav-badge hidden" id="ntfBadge"></span>
      </div>
      <div class="nav-section">Account</div>
      <div class="nav-item active" data-page="profile.html">
        <span class="nav-icon">👤</span><span class="nav-label">My Profile</span>
      </div>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" id="logoutBtn">🚪 Sign Out</button>
    </div>
  </aside>

  <!-- ═══════════════ MAIN ═══════════════ -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">My Profile <span>Account settings</span></div>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" id="notifBtn">
          🔔 <span class="dot hidden" id="ntfDot"></span>
        </button>
        <button class="icon-btn" id="profileBtn">👤</button>
      </div>
    </div>

    <div class="page-content">
      <div class="page-header">
        <h2>My Profile</h2>
        <p>Manage your personal information and account settings.</p>
      </div>

      <div class="grid-2">

        <!-- Personal Information -->
        <div class="card">
          <div class="card-header"><h3>👤 Personal Information</h3></div>
          <div class="card-body">

            <div class="profile-avatar-wrap">
              <div
                class="avatar"
                id="profileAvatar"
                style="width: 72px; height: 72px; font-size: 1.6rem;"
              ></div>
              <div class="profile-name" id="profileName"></div>
              <div class="profile-id"   id="profileId"></div>
            </div>

            <form id="profileForm" novalidate>
              <div class="form-group">
                <label for="profileFullName">Full Name</label>
                <input type="text" id="profileFullName" name="fullName" />
              </div>
              <div class="form-group">
                <label for="profileEmail">Email Address</label>
                <input type="email" id="profileEmail" name="email" />
              </div>
              <div class="form-group">
                <label for="profileIndex">Index Number</label>
                <input
                  type="text"
                  id="profileIndex"
                  name="indexNumber"
                  class="readonly-field"
                  readonly
                />
              </div>
              <div class="form-group">
                <label for="profileDept">Department</label>
                <input
                  type="text"
                  id="profileDept"
                  name="department"
                  class="readonly-field"
                  readonly
                />
              </div>
              <div class="form-group">
                <label for="profileLevel">Level</label>
                <input
                  type="text"
                  id="profileLevel"
                  name="level"
                  class="readonly-field"
                  readonly
                />
              </div>
              <button type="button" class="btn btn-primary" id="saveProfileBtn">
                💾 Save Changes
              </button>
            </form>

          </div>
        </div>

        <!-- Change Password -->
        <div class="card">
          <div class="card-header"><h3>🔒 Change Password</h3></div>
          <div class="card-body">
            <form id="passwordForm" novalidate>
              <div class="form-group">
                <label for="currentPassword">Current Password</label>
                <input
                  type="password"
                  id="currentPassword"
                  name="currentPassword"
                  placeholder="Enter current password"
                />
              </div>
              <div class="form-group">
                <label for="newPassword">New Password</label>
                <input
                  type="password"
                  id="newPassword"
                  name="newPassword"
                  placeholder="Enter new password"
                />
              </div>
              <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <input
                  type="password"
                  id="confirmPassword"
                  name="confirmPassword"
                  placeholder="Repeat new password"
                />
              </div>
              <button type="button" class="btn btn-primary" id="changePasswordBtn">
                🔒 Update Password
              </button>
            </form>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script src="../../js/app.js"></script>
<script src="../../js/notification.js"></script>
<script src="../../js/student.js"></script>
</body>
</html>
