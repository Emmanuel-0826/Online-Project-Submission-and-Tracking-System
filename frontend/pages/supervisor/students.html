<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPSTS – My Students</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/dashboard.css" />
  <link rel="stylesheet" href="../../css/supervisor.css" />
</head>
<body>
<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="../../assets/images/logo.png" alt="OPSTS Logo" />
      <div class="brand-text">OPSTS<small>Supervisor Portal</small></div>
    </div>
    <div class="sidebar-user">
      <div class="avatar" id="sideAvatar"></div>
      <div>
        <div class="u-name" id="sideUserName"></div>
        <div class="u-role" id="sideUserMeta"></div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div>
      <div class="nav-item" data-page="dashboard.html">
        <span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span>
      </div>
      <div class="nav-item active" data-page="students.html">
        <span class="nav-icon">🧑‍🎓</span><span class="nav-label">My Students</span>
      </div>
      <div class="nav-item" data-page="review.html">
        <span class="nav-icon">📝</span><span class="nav-label">Review Submissions</span>
        <span class="nav-badge hidden" id="reviewBadge"></span>
      </div>
      <div class="nav-item" data-page="progress.html">
        <span class="nav-icon">📊</span><span class="nav-label">Monitor Progress</span>
      </div>
      <div class="nav-section">Communication</div>
      <div class="nav-item" data-page="schedule.html">
        <span class="nav-icon">📅</span><span class="nav-label">Schedule Meetings</span>
      </div>
      <div class="nav-item" data-page="notifications.html">
        <span class="nav-icon">🔔</span><span class="nav-label">Notifications</span>
        <span class="nav-badge hidden" id="ntfBadge"></span>
      </div>
      <div class="nav-section">Account</div>
      <div class="nav-item" data-page="profile.html">
        <span class="nav-icon">👤</span><span class="nav-label">My Profile</span>
      </div>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" id="logoutBtn">🚪 Sign Out</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">My Students <span>Assigned students overview</span></div>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" id="notifBtn">🔔<span class="dot hidden" id="ntfDot"></span></button>
        <button class="icon-btn" id="profileBtn">👤</button>
      </div>
    </div>

    <div class="page-content">
      <div class="page-header">
        <h2>My Students</h2>
        <p>View and manage all students assigned to you.</p>
      </div>

      <div class="students-grid" id="studentsGrid"></div>

    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script src="../../js/app.js"></script>
<script src="../../js/notification.js"></script>
<script src="../../js/supervisor.js"></script>
</body>
</html>
